<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="color-scheme" content="light">
  <title>Surf i Kallsjön</title>
  <meta name="description" content="Aktuell vinddata och prognoser för Kallsjön">
  <meta name="theme-color" content="#fbfbf9">
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
  <link rel="apple-touch-icon" href="/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    /* App-skal: html/body/#root fyller skärmen, ingen sidscroll.
       Scrollen sker i <main> (flex-kolumn i KallsurfHome) — samma
       beteende i Safari och som installerad PWA. */
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #fbfbf9;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    #root {
      height: 100%;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>

<body class="bg-app-bg">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
      // Markera PWA-läge (kan användas för CSS-avvikelser vid behov)
      if (window.matchMedia('(display-mode: standalone)').matches ||
          (window.navigator.standalone) ||
          document.referrer.includes('android-app://')) {
        document.body.classList.add('standalone');
      }
  </script>
</body>

</html>
