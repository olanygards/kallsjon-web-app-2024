<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#022c22">
  <title>Sidan hittades inte - Surf i Kallsjön</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #022c22;
      color: #a7f3d0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 30px;
      background-color: rgba(6, 78, 59, 0.4);
      border: 1px solid rgba(6, 95, 70, 0.5);
      border-radius: 16px;
    }
    h1 {
      margin-top: 0;
      color: #6ee7b7;
    }
    p {
      margin-bottom: 20px;
      line-height: 1.5;
      color: #d1fae5;
    }
    a {
      display: inline-block;
      padding: 10px 20px;
      background-color: #059669;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    a:hover {
      background-color: #10b981;
    }
  </style>
  <script>
    const path = window.location.pathname;
    const oldPaths = [
      '/index.html',
      '/old-path',
    ];

    if (oldPaths.includes(path)) {
      window.location.href = '/';
    }
  </script>
</head>
<body>
  <div class="container">
    <h1>Sidan hittades inte</h1>
    <p>Sidan du söker finns inte längre eller har flyttats.</p>
    <a href="/">Gå till startsidan</a>
  </div>
</body>
</html>
